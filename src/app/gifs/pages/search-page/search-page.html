<h2 class="text-2xl font-bold mt-5">Search Gifs</h2>
<h3 class="text-sm text-gray-500">Search gifs by name, description, or tags</h3>

<section class="flex flex-col gap-4">
  <input type="text" placeholder="Search gifs..."
    class="mt-3 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
    (keyup.enter)="txtSearch.value && onSearch(txtSearch.value)" #txtSearch />
</section>

<!-- <section class="py-5 pl-5">
  <gif-list [gifs]="gifs()" />
</section> -->


<!-- bg-red-500  -->
<div class="h-screen overflow-y-scroll grid grid-cols-2 md:grid-cols-4 gap-4 pt-5"
  (scroll)="onScroll($event, txtSearch)" #groupDiv>

  @for(group of gifService.trendingGifSearchGroup(); track $index) {
  <div class="grid gap-4">

    @for(gif of group; track gif.id) {
    <div>
      <img class="h-full w-full rounded-lg object-cover" [src]="gif.url" [alt]="gif.title">
    </div>
    }
  </div>
  }
</div>
